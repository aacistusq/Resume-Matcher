openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Resume Analyzer API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: resumes
    description: Resume operations
  - name: analysis
    description: Resume analysis operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /resumes:
    get:
      operationId: listResumes
      tags: [resumes]
      summary: List all resumes
      responses:
        "200":
          description: List of resumes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Resume"
    post:
      operationId: createResume
      tags: [resumes]
      summary: Upload a resume
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateResumeBody"
      responses:
        "201":
          description: Resume created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resume"

  /resumes/{id}:
    get:
      operationId: getResume
      tags: [resumes]
      summary: Get a resume by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Resume found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resume"
        "404":
          description: Not found
    delete:
      operationId: deleteResume
      tags: [resumes]
      summary: Delete a resume
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /analysis:
    post:
      operationId: analyzeResume
      tags: [analysis]
      summary: Analyze resume against a job description
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeResumeBody"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"

  /analysis/history/{resumeId}:
    get:
      operationId: getAnalysisHistory
      tags: [analysis]
      summary: Get analysis history for a resume
      parameters:
        - name: resumeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Analysis history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnalysisRecord"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Resume:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        content:
          type: string
        fileName:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - content
        - fileName
        - createdAt

    CreateResumeBody:
      type: object
      properties:
        name:
          type: string
        content:
          type: string
        fileName:
          type: string
      required:
        - name
        - content
        - fileName

    AnalyzeResumeBody:
      type: object
      properties:
        resumeId:
          type: integer
        jobDescription:
          type: string
      required:
        - resumeId
        - jobDescription

    ScoreBreakdown:
      type: object
      properties:
        mustHaveScore:
          type: number
        preferredScore:
          type: number
        experienceScore:
          type: number
        evidenceScore:
          type: number
        resumeQualityScore:
          type: number
        penaltiesApplied:
          type: number
        scoreCapApplied:
          type: number
          nullable: true
        rawScoreBeforePenalties:
          type: number
        finalScore:
          type: number
        matchedCount:
          type: integer
        partialCount:
          type: integer
        missingCount:
          type: integer
        missingCriticalCount:
          type: integer
      required:
        - mustHaveScore
        - preferredScore
        - experienceScore
        - evidenceScore
        - resumeQualityScore
        - penaltiesApplied
        - rawScoreBeforePenalties
        - finalScore
        - matchedCount
        - partialCount
        - missingCount
        - missingCriticalCount

    AnalysisResult:
      type: object
      properties:
        fitScore:
          type: number
          description: Deterministic fit score 0-100
        resumeQualityScore:
          type: number
          description: AI resume quality score 0-10
        scoreBand:
          type: string
          description: "Strong Fit | Decent Fit | Partial Fit | Weak Fit | Poor Fit"
        scoreBreakdown:
          $ref: "#/components/schemas/ScoreBreakdown"
        matchedSkills:
          type: array
          items:
            type: string
        partialSkills:
          type: array
          items:
            type: string
        missingSkills:
          type: array
          items:
            type: string
        topGaps:
          type: array
          items:
            type: string
        whyNotHigher:
          type: array
          items:
            type: string
        suggestions:
          type: array
          items:
            type: string
        summary:
          type: string
        scoreRationale:
          type: string
        confidenceLevel:
          type: string
        analysisId:
          type: integer
      required:
        - fitScore
        - resumeQualityScore
        - scoreBand
        - scoreBreakdown
        - matchedSkills
        - partialSkills
        - missingSkills
        - topGaps
        - whyNotHigher
        - suggestions
        - summary
        - scoreRationale
        - confidenceLevel
        - analysisId

    AnalysisRecord:
      type: object
      properties:
        id:
          type: integer
        resumeId:
          type: integer
        jobDescription:
          type: string
        fitScore:
          type: number
        resumeQualityScore:
          type: number
        scoreBand:
          type: string
        scoreBreakdown:
          $ref: "#/components/schemas/ScoreBreakdown"
        matchedSkills:
          type: array
          items:
            type: string
        partialSkills:
          type: array
          items:
            type: string
        missingSkills:
          type: array
          items:
            type: string
        topGaps:
          type: array
          items:
            type: string
        whyNotHigher:
          type: array
          items:
            type: string
        suggestions:
          type: array
          items:
            type: string
        summary:
          type: string
        scoreRationale:
          type: string
        confidenceLevel:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - resumeId
        - jobDescription
        - fitScore
        - resumeQualityScore
        - scoreBand
        - matchedSkills
        - partialSkills
        - missingSkills
        - topGaps
        - whyNotHigher
        - suggestions
        - summary
        - scoreRationale
        - confidenceLevel
        - createdAt
